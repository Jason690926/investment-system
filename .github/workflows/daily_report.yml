name: Daily Investment Report

on:
  # 自動排程已停用（2026-05-03，1 人手動模式）；要恢復把下方兩行取消註解即可
  # schedule:
  #   - cron: '30 6 * * 1-5'  # UTC 06:30 = 台灣 14:30，週一到週五
  workflow_dispatch:         # 保留：GitHub UI 可一鍵手動觸發

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        run: python run_daily_report.py
        env:
          SUPABASE_DB_HOST:     ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER:     ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_NAME:     ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT:     ${{ secrets.SUPABASE_DB_PORT }}
          CLAUDE_API_KEY:       ${{ secrets.CLAUDE_API_KEY }}
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:       ${{ secrets.EMAIL_PASSWORD }}
          APP_URL:              ${{ secrets.APP_URL }}
